name: Deploy to Firebase Hosting on PR
'on': pull_request
concurrency:
  group: firebase-hosting-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true
jobs:
  build_and_preview:
    if: '${{ github.event.pull_request.head.repo.full_name == github.repository }}'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: create .env file
        run: |
          touch .env
          echo "VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }}" >> .env
          echo "VITE_GTAG_ID=${{ secrets.VITE_GTAG_ID }}" >> .env
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0.11.0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ASSET_MANAGEMENT_SIMULATION }}'
          projectId: asset-management-simulation
